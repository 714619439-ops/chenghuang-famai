  <main>
    <div class="container">
      <div class="page-header">
        <h1>祈请文生成器</h1>
        <p>输入姓名与司署，一键生成专属祈请文</p>
      </div>

      <div class="prayer-form">
        <label for="prayer-name">请输入您的姓名</label>
        <input type="text" id="prayer-name" placeholder="例如：张三" required>

        <label for="prayer-dharma">法号（选填）</label>
        <input type="text" id="prayer-dharma" placeholder="例如：妙如广华子">

        <label for="prayer-si">请选择司署</label>
        <select id="prayer-si">
          <option value="">— 请选择 —</option>
        </select>

        <button class="btn btn-gold" id="generate-btn" style="width:100%;margin-top:var(--space-sm)">🙏 生成祈请文</button>
      </div>

      <div class="prayer-result" id="prayer-result">
        <div class="divider">✦ ✦ ✦</div>
        <h3 style="color:var(--gold-light);text-align:center;margin-bottom:var(--space-md);letter-spacing:3px">您的祈请文</h3>
        <div class="prayer-text-block" id="prayer-content"></div>
        <div style="text-align:center;margin-top:var(--space-md)">
          <button class="btn btn-gold btn-sm copy-btn" data-target="prayer-content">📋 复制祈请文</button>
        </div>
      </div>
    </div>
